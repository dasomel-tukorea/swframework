# src/main/resources/application-h2.yml
# H2 인메모리 DB 설정 (개발/테스트 환경)
# 사용법: ./gradlew bootRun --args='--spring.profiles.active=h2'

spring:
  datasource:
    url: jdbc:h2:mem:testdb;CASE_INSENSITIVE_IDENTIFIERS=TRUE           # 인메모리 DB (서버 종료 시 데이터 삭제)
    driver-class-name: org.h2.Driver
    username: sa
    password:                         # H2 기본값: 비밀번호 없음
  h2:
    console:
      enabled: true                   # H2 웹 콘솔 활성화
      path: /h2-console               # 접속 경로: http://localhost:8080/h2-console
  sql:
    init:
      mode: always                    # 서버 시작 시 schema.sql 자동 실행

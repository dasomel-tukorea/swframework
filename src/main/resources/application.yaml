# src/main/resources/application.yml
server:
  port: 8080                          # 서버 포트

spring:
  datasource:
    url: jdbc:h2:mem:testdb;CASE_INSENSITIVE_IDENTIFIERS=TRUE  # 인메모리 모드
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true                   # H2 웹 콘솔 활성화
      path: /h2-console               # 접속 URL: localhost:8080/h2-console
  sql:
    init:
      mode: always                    # 앱 시작 시 schema.sql 자동 실행
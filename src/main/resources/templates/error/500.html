<!DOCTYPE html>
<!--
  [복사 위치] src/main/resources/templates/error/500.html
  Week 10 — Lab 02: 커스텀 500 에러 페이지

  GlobalExceptionHandler.handleGeneral()이 "error/500" 뷰 이름을 반환할 때 렌더링.
  ${message}: 보안상 "서버 내부 오류가 발생했습니다." 같은 일반 메시지만 전달
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>서버 오류</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .error-container { text-align: center; padding: 80px 20px; }
        .error-code { font-size: 6rem; font-weight: bold; color: #e74c3c; margin: 0; }
        .error-title { font-size: 1.5rem; color: #2c3e50; margin: 16px 0; }
        .error-message { color: #7f8c8d; margin-bottom: 32px; }
    </style>
</head>
<body>
<div class="container">
    <div class="error-container">
        <p class="error-code">500</p>
        <h2 class="error-title">서버 내부 오류가 발생했습니다</h2>
        <p class="error-message" th:text="${message} ?: '잠시 후 다시 시도해 주세요.'">
            잠시 후 다시 시도해 주세요.
        </p>
        <a th:href="@{/students}" class="btn">학생 목록으로</a>
    </div>
</div>
</body>
</html>
